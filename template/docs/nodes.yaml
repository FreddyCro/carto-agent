# CartoAgent Node Registry
# 由 /ca-scout 初始化，/ca-navigate 自動擴充
# 完整 schema 見 README.md
#
# conventions:  由 /ca-scout 偵察後寫入
# nodes:
#   - name:     [必填] 模組名
#     path:     [必填] 相對路徑
#     group:    [必填] 分組（須為 conventions.groups 之一）
#     comm:     [選填] 通訊機制（type / target / description）
#     edges:    [選填] 依賴模組列表
#     refs:     [選填] 相關 ADR / 文件路徑

version: '1.0'
project: '{project-name}'
nodes: []